# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Build, test, and package

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  release-please:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    needs: [release-please]
    if: always() && (needs.release-please.result == 'success' || needs.release-please.result == 'skipped')
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v2
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v1
        with:
          node-version: ${{ matrix.node-version }}

      - run: cp config.json.example config.json
      - run: npm ci
      - run: npm test
      - uses: codecov/codecov-action@v2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
      - name: Set up QEMU
        id: qemu
        uses: docker/setup-qemu-action@v1
        with:
          image: tonistiigi/binfmt:latest
          platforms: amd64,arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Login to DockerHub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      # deploy to docker hub, only run on main branch
      - name: get docker tags
        id: get_tags
        env:
          IMAGE: casmith/sync-todoist-to-habitica
          RELEASE_CREATED: ${{ needs.release-please.outputs.release_created }}
          RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          tags=""
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            tags="${IMAGE}:pr-${{ github.event.pull_request.number }}"
          elif [ "$GITHUB_REF" = "refs/heads/master" ]; then
            pkg_version=$(node -p "require('./package.json').version")
            tags="${IMAGE}:latest,${IMAGE}:${pkg_version}-${GITHUB_SHA:0:7}"
            if [ "$RELEASE_CREATED" = "true" ]; then
              tags="${tags},${IMAGE}:${RELEASE_VERSION}"
            fi
          else
            branch_name=${GITHUB_REF##*/}
            tags="${IMAGE}:dev-${branch_name}-${GITHUB_SHA:0:8}"
          fi
          echo "tags=${tags}" >> $GITHUB_OUTPUT
      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v2
        with:
          push: true
          tags: ${{ steps.get_tags.outputs.tags }}
          platforms: linux/amd64,linux/arm64
